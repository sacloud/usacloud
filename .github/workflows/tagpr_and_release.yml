# .github/workflows/tagpr.yml
name: tagpr
on:
  push:
    branches: ["main"]

jobs:
  tagpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      packages: write
      actions: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - uses: Songmu/tagpr@d1b8138b7a31075141b6cd64103de9485ced7ac9 # v1.20.1
      id: tagpr
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: 'go.mod'
      if: ${{ steps.tagpr.outputs.tag != ''}}

    - name: Import GPG key
      id: import_gpg
      uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
      with:
        gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.GPG_PASSPHRASE }}
        git_user_signingkey: true
        git_commit_gpgsign: true
      if: ${{ steps.tagpr.outputs.tag != ''}}

    - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      id: bot-token
      with:
        client-id: ${{ secrets.SACLOUD_BOT_CLIENT_ID }}
        private-key: ${{ secrets.SACLOUD_BOT_PRIVATE_KEY }}

    - name: Run GoReleaser
      uses:  goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
      with:
        version: '~> v2.10'
        args: release  --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
        NFPM_DEFAULT_PASSPHRASE: ${{ secrets.PASSPHRASE }}
        HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}
      if: ${{ steps.tagpr.outputs.tag != ''}}

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
      with:
        images: ghcr.io/sacloud/usacloud
      if: ${{ steps.tagpr.outputs.tag != ''}}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      if: ${{ steps.tagpr.outputs.tag != ''}}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      if: ${{ steps.tagpr.outputs.tag != ''}}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.CR_PAT }}
      if: ${{ steps.tagpr.outputs.tag != ''}}

    - name: Build and push to GitHub Container Registry
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }},ghcr.io/sacloud/usacloud:latest,ghcr.io/sacloud/usacloud:${{ steps.tagpr.outputs.tag }}
        push: true
      if: ${{ steps.tagpr.outputs.tag != ''}}

